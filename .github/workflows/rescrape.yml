name: Re-scrape OpenReview + iclr.cc

on:
  schedule:
    # Every 6 hours at :17 to avoid top-of-hour congestion.
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: rescrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Stage 1 scrape
        run: python scripts/stage1_scrape.py

      - name: Commit if changed
        run: |
          git config user.name "iclr-bot"
          git config user.email "iclr-bot@users.noreply.github.com"
          git add data/papers.json data/unmatched.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh papers.json $(date -u +%FT%TZ)"
            git push
          fi
